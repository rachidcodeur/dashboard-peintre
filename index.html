<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Choix du projet</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #f4f7f9 0%, #f4f5f7 100%);
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
    a { color: inherit; text-decoration: none; }

    .header {
      text-align: center;
      margin-bottom: 3rem;
    }
    .header h1 {
      font-size: 2.2rem;
      font-weight: 800;
      color: #1a1a1a;
      margin-bottom: .6rem;
    }
    .header .subtitle {
      color: #666;
      font-size: 1rem;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 2rem;
      width: 100%;
      max-width: 900px;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      padding: 2.5rem 2rem;
      text-align: center;
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.06);
      border: 1px solid rgba(0, 0, 0, 0.04);
      transition: transform .25s ease, box-shadow .25s ease, border-color .25s ease;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }
    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.12);
    }

    .logo-wrap {
      width: 120px;
      height: 120px;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: .5rem;
      padding: 14px;
      background: #fff;
      border: 1px solid rgba(0, 0, 0, 0.06);
      transition: transform .25s ease;
    }
    .card:hover .logo-wrap {
      transform: scale(1.04);
    }
    .logo-wrap img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      display: block;
    }

    .card h2 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1a1a1a;
    }
    .card p {
      color: #666;
      font-size: .92rem;
      line-height: 1.5;
      max-width: 280px;
    }

    .card .cta {
      margin-top: 1rem;
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      padding: .7rem 1.5rem;
      border-radius: 50px;
      font-size: .9rem;
      font-weight: 600;
      color: #fff;
      transition: gap .2s ease;
    }
    .card:hover .cta { gap: .7rem; }
    .card .cta svg {
      width: 16px;
      height: 16px;
      stroke-width: 2.5;
      fill: none;
      stroke: currentColor;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* Bâtiment — bleu/teal */
    .card--batiment .cta {
      background: linear-gradient(135deg, #04bbff, #007198);
    }
    .card--batiment:hover {
      border-color: rgba(4, 187, 255, 0.4);
    }

    /* Intérieur — orange */
    .card--interieur .cta {
      background: linear-gradient(135deg, #FD9D4E, #BD5722);
    }
    .card--interieur:hover {
      border-color: rgba(253, 157, 78, 0.4);
    }

    @media (max-width: 720px) {
      .cards { grid-template-columns: 1fr; gap: 1.5rem; }
      .header h1 { font-size: 1.6rem; }
      .card { padding: 2rem 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Dashboards</h1>
    <div class="subtitle">Choisis le projet à consulter</div>
  </div>

  <div class="cards">

    <a href="batiment.html" class="card card--batiment">
      <div class="logo-wrap">
        <img src="assets/logo-batiment.webp" alt="Peintre en Bâtiment" loading="lazy">
      </div>
      <h2>Peintre en Bâtiment</h2>
      <span class="cta">
        Ouvrir le dashboard
        <svg viewBox="0 0 24 24"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
      </span>
    </a>

    <a href="interieur/index.html" class="card card--interieur">
      <div class="logo-wrap">
        <img src="assets/logo-interieur.webp" alt="Peintre Intérieur" loading="lazy">
      </div>
      <h2>Peintre Intérieur</h2>
      <span class="cta">
        Ouvrir le dashboard
        <svg viewBox="0 0 24 24"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
      </span>
    </a>

  </div>
</body>
</html>
