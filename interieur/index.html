<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Peintre Intérieur</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Poppins", -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f4f5f7;
      color: #1a1a1a;
      min-height: 100vh;
    }
    a { color: inherit; text-decoration: none; }

    .dash-header {
      text-align: center;
      padding: 2.5rem 1rem 1.5rem;
    }
    .dash-header h1 {
      font-size: 2rem;
      font-weight: 800;
      color: #010122;
      margin-bottom: .6rem;
    }
    .accent { color: #BD5722; }
    .badge {
      display: inline-block;
      background: linear-gradient(135deg, #FD9D4E, #BD5722);
      color: #fff;
      padding: .45rem 1.4rem;
      border-radius: 50px;
      font-size: .95rem;
      font-weight: 600;
    }
    .back-link {
      display: inline-block;
      color: #BD5722;
      font-size: .9rem;
      margin-bottom: .5rem;
      transition: opacity .2s;
    }
    .back-link:hover { opacity: .7; }

    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 1.5rem;
    }

    .search-box {
      max-width: 560px;
      margin: 0 auto 2rem;
      text-align: center;
    }
    .search-box input {
      width: 100%;
      padding: .85rem 1.2rem;
      border-radius: 12px;
      border: 1px solid rgba(1, 1, 34, 0.15);
      background: #fff;
      color: #1a1a1a;
      font-size: 1rem;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .search-box input::placeholder { color: #999; }
    .search-box input:focus {
      border-color: #BD5722;
      box-shadow: 0 0 0 3px rgba(189, 87, 34, 0.18);
    }
    .search-count {
      margin-top: .5rem;
      font-size: .85rem;
      color: #888;
    }

    .dep-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1rem;
    }
    .dep-card {
      background: linear-gradient(145deg, #FD9D4E, #BD5722);
      border-radius: 14px;
      padding: 1.3rem;
      transition: transform .2s, box-shadow .2s;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      color: #fff;
    }
    .dep-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 32px rgba(189, 87, 34, 0.3);
    }
    .dep-card-icon {
      position: absolute;
      top: 1rem;
      right: 1rem;
      font-size: 1.3rem;
      opacity: .6;
    }
    .dep-card-title {
      font-size: 1.05rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: .35rem;
    }
    .dep-card-count {
      color: rgba(255, 255, 255, 0.9);
      font-weight: 700;
      font-size: .95rem;
    }
    .dep-card-name {
      color: rgba(255, 255, 255, 0.7);
      font-size: .85rem;
      margin-top: .15rem;
    }

    .dep-detail-card {
      background: #fff;
      border: 1px solid rgba(1, 1, 34, 0.1);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(1, 1, 34, 0.06);
    }
    .dep-detail-header {
      background: linear-gradient(135deg, #FD9D4E, #BD5722);
      color: #fff;
      padding: 1rem 1.5rem;
      font-weight: 700;
      font-size: 1rem;
    }

    .sites-table {
      width: 100%;
      border-collapse: collapse;
    }
    .sites-table tr {
      border-bottom: 1px solid rgba(1, 1, 34, 0.06);
      transition: background .15s;
    }
    .sites-table tr:hover {
      background: rgba(189, 87, 34, 0.05);
    }
    .sites-table td {
      padding: .75rem 1rem;
      vertical-align: middle;
    }
    .row-num {
      color: #BD5722;
      font-weight: 700;
      width: 3rem;
      text-align: center;
    }
    .row-name a {
      color: #1a1a1a;
      font-weight: 500;
      transition: color .15s;
    }
    .row-name a:hover { color: #BD5722; }
    .pop {
      margin-left: .6rem;
      color: #BD5722;
      font-size: .85rem;
    }
    .row-actions {
      text-align: right;
      white-space: nowrap;
    }
    .action-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      border-radius: 8px;
      background: linear-gradient(135deg, #FD9D4E, #BD5722);
      margin-left: 4px;
      font-size: .8rem;
      transition: transform .15s, box-shadow .15s;
      color: #fff;
    }
    .action-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 3px 12px rgba(189, 87, 34, 0.3);
    }
    .action-g { font-weight: 700; font-size: .85rem; }
    .action-b { font-weight: 700; font-size: .85rem; }

    @media (max-width: 640px) {
      .dash-header h1 { font-size: 1.4rem; }
      .dep-grid { grid-template-columns: repeat(2, 1fr); gap: .7rem; }
      .dep-card { padding: 1rem; }
      .row-actions { display: none; }
    }
  </style>
</head>
<body>
  <header class="dash-header">
    <a href="../index.html" class="back-link">← Choix du projet</a>
    <h1>Sites Peintre Intérieur</h1>
    <div class="badge">391 sites en ligne · 1 départements</div>
  </header>

  <main class="container">
    <div class="search-box">
      <input type="text" id="search" placeholder="Rechercher un département..." autocomplete="off">
    </div>

    <div class="dep-grid" id="dep-grid">

        <a href="dep-01.html" class="dep-card">
          <div class="dep-card-icon">🌐</div>
          <div class="dep-card-title">Peintre Intérieur 01</div>
          <div class="dep-card-count">391 sites</div>
          <div class="dep-card-name">Ain</div>
        </a>
    </div>
  </main>

  <script>
    const input = document.getElementById('search');
    const grid  = document.getElementById('dep-grid');
    const cards = [...grid.querySelectorAll('.dep-card')];
    input.addEventListener('input', function() {
      const q = this.value.toLowerCase().trim();
      cards.forEach(c => {
        const text = c.textContent.toLowerCase();
        c.style.display = (!q || text.includes(q)) ? '' : 'none';
      });
    });
  </script>
</body>
</html>
